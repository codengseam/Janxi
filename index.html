<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简兮 · 轻量纯静态工具集</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --surface: rgba(255, 255, 255, 0.78);
      --surface-solid: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #555;
      --text-muted: #888;
      --accent: #1d8f5b;
      --accent-2: #5b4dff;
      --border: rgba(0, 0, 0, 0.08);
      --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
      --radius: 20px;
      --radius-sm: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Hero */
    .hero {
      position: relative;
      padding: 96px 24px 72px;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(29, 143, 91, 0.12), transparent 35%),
        radial-gradient(circle at 80% 20%, rgba(91, 77, 255, 0.10), transparent 40%),
        radial-gradient(circle at 60% 90%, rgba(29, 143, 91, 0.08), transparent 35%);
      pointer-events: none;
    }
    .hero-inner {
      position: relative;
      max-width: 920px;
      margin: 0 auto;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 18px;
    }
    .brand-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(29,143,91,0.15);
    }
    h1 {
      font-size: clamp(36px, 6vw, 64px);
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 18px;
    }
    .hero p {
      font-size: 18px;
      color: var(--text-secondary);
      max-width: 560px;
      margin-bottom: 32px;
    }
    .search-wrap {
      position: relative;
      max-width: 480px;
    }
    .search-wrap svg {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      width: 20px; height: 20px;
      color: var(--text-muted);
    }
    #search {
      width: 100%;
      padding: 16px 16px 16px 48px;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-solid);
      box-shadow: var(--shadow);
      outline: none;
      transition: box-shadow .2s, border-color .2s;
    }
    #search:focus {
      border-color: rgba(29,143,91,0.4);
      box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 12px 32px rgba(29,143,91,0.10);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      max-width: 920px;
      margin: 0 auto;
      padding: 0 24px 12px;
    }
    .tab {
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all .2s;
    }
    .tab:hover { background: rgba(0,0,0,0.03); }
    .tab.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    /* Main */
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 24px 96px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 32px 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .card {
      display: flex;
      flex-direction: column;
      padding: 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      transition: transform .2s, box-shadow .2s;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
    }
    .card.hidden { display: none; }
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .card-icon {
      width: 40px; height: 40px;
      border-radius: var(--radius-sm);
      display: grid;
      place-items: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .card-icon.convert { background: #eef2ff; }
    .card-icon.focus { background: #e8f5ee; }
    .card-icon.learn { background: #fff7e6; }
    .card-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      color: var(--text-muted);
      background: rgba(0,0,0,0.04);
    }
    .card h3 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .card p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 18px;
      flex: 1;
    }
    .card-actions {
      display: flex;
      gap: 10px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: all .2s;
      border: 1px solid transparent;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--text);
      color: #fff;
    }
    .btn-primary:hover { background: #333; }
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border-color: var(--border);
    }
    .btn-ghost:hover { background: rgba(0,0,0,0.03); }
    .btn svg { width: 14px; height: 14px; }

    .empty {
      display: none;
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .empty.visible { display: block; }

    footer {
      max-width: 920px;
      margin: 0 auto;
      padding: 32px 24px 64px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }
    footer a { color: var(--text-secondary); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      .hero { padding: 72px 20px 48px; }
      .tabs { padding: 0 20px 8px; }
      main { padding: 16px 20px 64px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div class="brand"><span class="brand-dot"></span>JANXI TOOLS</div>
      <h1>简兮 · 轻量纯静态工具集</h1>
      <p>无后端依赖，打开即用。格式转换、效率专注与学习速查，随取随走。</p>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search" type="text" placeholder="搜索工具…" autocomplete="off">
      </div>
    </div>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-filter="all">全部</button>
    <button class="tab" data-filter="convert">格式转换</button>
    <button class="tab" data-filter="focus">效率专注</button>
    <button class="tab" data-filter="learn">学习速查</button>
  </div>

  <main id="main"></main>

  <div class="empty" id="empty">没有找到匹配的工具</div>

  <footer>
    <p>其他首页风格：<a href="index-demo-terminal.html">终端风</a> · <a href="index-demo-editorial.html">杂志风</a></p>
  </footer>

  <script>
    const tools = [
      { file: 'file-converter.html', title: '文件格式转换', desc: '本地离线文件格式互转，支持文本、文档、PDF 等常见格式。', category: 'convert', icon: '🔄' },
      { file: 'pdf-to-ppt-converter.html', title: 'PDF 转 PPT', desc: '将 PDF 页面识别并导出为可编辑的 PPTX 演示文稿。', category: 'convert', icon: '📑' },
      { file: '番茄时钟.html', title: '超级番茄', desc: '番茄工作法计时器，帮助保持专注并记录任务节奏。', category: 'focus', icon: '🍅' },
      { file: 'ai_learning_path_for_programmers.html', title: '程序员 AI 学习路径', desc: '普通程序员转向 AI 的阶段性路线与核心知识点。', category: 'learn', icon: '🤖' },
      { file: 'data_structures_guide.html', title: '数据结构完全指南', desc: 'Python 版算法与数据结构完整学习手册。', category: 'learn', icon: '📐' },
      { file: 'algo_tier1.html', title: '算法第一梯队速查', desc: '高频核心算法模板、原理与经典题目快速回顾。', category: 'learn', icon: '⚡' },
      { file: 'algo_tier2_3 (1).html', title: '算法第二、三梯队速查', desc: '进阶算法专题速查，覆盖第二、三梯队考点。', category: 'learn', icon: '🧩' }
    ];

    const categories = {
      convert: { label: '格式转换', iconClass: 'convert' },
      focus: { label: '效率专注', iconClass: 'focus' },
      learn: { label: '学习速查', iconClass: 'learn' }
    };

    const main = document.getElementById('main');
    const empty = document.getElementById('empty');
    const searchInput = document.getElementById('search');
    const tabs = document.querySelectorAll('.tab');
    let activeFilter = 'all';

    function render() {
      main.innerHTML = '';
      const groups = {};
      const term = searchInput.value.trim().toLowerCase();

      tools.forEach(t => {
        if (activeFilter !== 'all' && t.category !== activeFilter) return;
        if (term && !t.title.toLowerCase().includes(term) && !t.desc.toLowerCase().includes(term)) return;
        (groups[t.category] ||= []).push(t);
      });

      Object.keys(groups).forEach(cat => {
        const sec = document.createElement('section');
        sec.innerHTML = `<h2 class="section-title">${categories[cat].label}</h2><div class="grid"></div>`;
        const grid = sec.querySelector('.grid');
        groups[cat].forEach(t => {
          grid.innerHTML += `
            <article class="card" data-category="${t.category}">
              <div class="card-top">
                <div class="card-icon ${categories[t.category].iconClass}">${t.icon}</div>
                <span class="card-tag">${categories[t.category].label}</span>
              </div>
              <h3>${t.title}</h3>
              <p>${t.desc}</p>
              <div class="card-actions">
                <a class="btn btn-primary" href="${t.file}">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                  打开
                </a>
                <a class="btn btn-ghost" href="${t.file}" download="${t.file}">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  下载
                </a>
              </div>
            </article>
          `;
        });
        main.appendChild(sec);
      });

      empty.classList.toggle('visible', Object.keys(groups).length === 0);
    }

    tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        tabs.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        render();
      });
    });

    searchInput.addEventListener('input', render);
    render();
  </script>
</body>
</html>
