<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简兮 · 终端控制台</title>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #11141a;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --accent: #22c55e;
      --accent-dim: #15803d;
      --border: #1e293b;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(17,20,26,0.85);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #eab308; }
    .dot.green { background: #22c55e; }
    .topbar-title { margin-left: auto; font-size: 12px; color: var(--text-dim); }

    .wrap {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 24px 80px;
      flex: 1;
    }

    .prompt {
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 8px;
    }
    h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    .subtitle { color: var(--text-dim); margin-bottom: 32px; }

    .cmd {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      font-size: 14px;
    }
    .cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font: inherit;
      padding: 6px 0;
      outline: none;
    }
    .cmd-input:focus { border-color: var(--accent); }
    .cursor {
      display: inline-block;
      width: 8px; height: 18px;
      background: var(--accent);
      animation: blink 1s step-end infinite;
      vertical-align: middle;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .section-label {
      font-size: 12px;
      color: var(--text-dim);
      margin: 28px 0 10px;
    }
    .list {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel);
    }
    .row {
      display: grid;
      grid-template-columns: 44px 1fr 140px 120px;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      transition: background .15s;
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: rgba(34,197,94,0.06); }
    .row.hidden { display: none; }
    .row-icon { color: var(--accent); text-align: center; }
    .row-name { font-weight: 600; }
    .row-desc { color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .link {
      color: var(--accent);
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      transition: background .15s;
    }
    .link:hover { background: rgba(34,197,94,0.12); }
    .link.dim { color: var(--text-dim); }
    .link.dim:hover { background: rgba(100,116,139,0.12); }

    .stats {
      display: flex;
      gap: 24px;
      margin-top: 32px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .stats b { color: var(--accent); }

    footer {
      text-align: center;
      padding: 28px 24px 48px;
      font-size: 12px;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 680px) {
      .row { grid-template-columns: 32px 1fr auto; }
      .row-desc { display: none; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="dot red"></span>
    <span class="dot yellow"></span>
    <span class="dot green"></span>
    <span class="topbar-title">janxi@local ~/tools</span>
  </div>

  <div class="wrap">
    <div class="prompt">~/tools $ ls -la</div>
    <h1>janxi_tools</h1>
    <p class="subtitle">纯静态 · 本地运行 · 数据不上传</p>

    <div class="cmd">
      <span class="cursor"></span>
      <input id="filter" class="cmd-input" type="text" placeholder="输入关键词过滤工具…" autocomplete="off">
    </div>

    <div id="main"></div>

    <div class="stats">
      <span>total: <b id="total">7</b></span>
      <span>convert: <b id="c-convert">2</b></span>
      <span>focus: <b id="c-focus">1</b></span>
      <span>learn: <b id="c-learn">4</b></span>
    </div>
  </div>

  <footer>
    <p>切换风格：<a href="index.html">Bento 风</a> · <a href="index-demo-editorial.html">杂志风</a></p>
  </footer>

  <script>
    const tools = [
      { file: 'file-converter.html', title: 'file-converter', desc: '本地文件格式互转', category: 'convert', icon: '↻' },
      { file: 'pdf-to-ppt-converter.html', title: 'pdf-to-ppt', desc: 'PDF 转可编辑 PPTX', category: 'convert', icon: '⧉' },
      { file: '番茄时钟.html', title: 'pomodoro', desc: '番茄工作法计时器', category: 'focus', icon: '◷' },
      { file: 'ai_learning_path_for_programmers.html', title: 'ai-learning-path', desc: '程序员转 AI 学习路线', category: 'learn', icon: '⌘' },
      { file: 'data_structures_guide.html', title: 'data-structures', desc: 'Python 数据结构指南', category: 'learn', icon: '▦' },
      { file: 'algo_tier1.html', title: 'algo-tier1', desc: '第一梯队算法速查', category: 'learn', icon: '⚡' },
      { file: 'algo_tier2_3 (1).html', title: 'algo-tier2_3', desc: '第二、三梯队算法速查', category: 'learn', icon: '❖' }
    ];

    const cats = { convert: 'convert', focus: 'focus', learn: 'learn' };
    const main = document.getElementById('main');
    const filterInput = document.getElementById('filter');

    function render() {
      main.innerHTML = '';
      const term = filterInput.value.trim().toLowerCase();
      const groups = {};
      tools.forEach(t => {
        if (term && !t.title.toLowerCase().includes(term) && !t.desc.toLowerCase().includes(term)) return;
        (groups[t.category] ||= []).push(t);
      });

      Object.keys(groups).forEach(cat => {
        const sec = document.createElement('div');
        sec.innerHTML = `<div class="section-label">drwxr-xr-x  ${cat}/</div><div class="list"></div>`;
        const list = sec.querySelector('.list');
        groups[cat].forEach(t => {
          list.innerHTML += `
            <div class="row" data-cat="${t.category}">
              <div class="row-icon">${t.icon}</div>
              <div class="row-name">${t.title}</div>
              <div class="row-desc">${t.desc}</div>
              <div class="row-actions">
                <a class="link" href="${t.file}">open</a>
                <a class="link dim" href="${t.file}" download="${t.file}">dl</a>
              </div>
            </div>
          `;
        });
        main.appendChild(sec);
      });

      document.getElementById('total').textContent = tools.filter(t => !term || t.title.toLowerCase().includes(term) || t.desc.toLowerCase().includes(term)).length;
    }

    filterInput.addEventListener('input', render);
    render();
  </script>
</body>
</html>
