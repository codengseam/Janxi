      },
      {
        name: "数据飞轮",
        tag: "optional",
        tagLabel: "进阶",
        summary: "构建持续改进的 AI 产品",
        principle: "数据飞轮：用户使用 → 产生日志 → 标注/筛选 → 微调/改进 Prompt → 更好的产品 → 更多用户。这是 AI 产品的核心竞争壁垒。主动学习：选择模型最不确定的样本标注，提高标注效率。合成数据：用强模型生成弱模型的训练数据（Self-Play、Constitutional AI）。",
        mustKnow: ["日志收集与隐私合规的平衡", "用户反馈信号的设计（点赞/踩/修改）", "合成数据生成的质量控制", "Eval-Driven Development 开发模式"],
        tips: ["数据标注质量 > 数据量，1000 条高质量标注 > 10000 条低质量的", "合成数据被验证有效，但要加多样性控制，否则会强化模型偏见", "把 Eval 集增长和产品迭代绑定，每次修复 Bug 就加一条测试用例"]
      }
    ]
  }
];

function renderStages() {
  const nav = document.getElementById('stageNav');
  const panels = document.getElementById('stagePanels');
  
  stages.forEach((stage, si) => {
    const btn = document.createElement('button');
    btn.className = 'stage-btn' + (si === 0 ? ' active' : '');
    btn.textContent = stage.label;
    btn.onclick = () => switchStage(si);
    nav.appendChild(btn);
    
    const panel = document.createElement('div');
    panel.className = 'stage-panel' + (si === 0 ? ' active' : '');
    panel.id = 'panel-' + si;
    
    panel.innerHTML = `
      <div class="stage-header">
        <div class="stage-title">${stage.title}</div>
        <div class="stage-desc">${stage.desc}</div>
        <div class="progress-bar-wrap">
          <div class="progress-label"><span>学习进度参考</span><span>${stage.progress}% 完成后可进入下一阶段</span></div>
          <div class="progress-track"><div class="progress-fill" style="width:${stage.progress}%; background:${stage.color}"></div></div>
        </div>
      </div>
      <div class="topics-grid">${stage.topics.map((t, ti) => renderTopic(t, si, ti)).join('')}</div>
    `;
    panels.appendChild(panel);
  });
}

function renderTopic(t, si, ti) {
  const tagClass = { must: 'tag-must', important: 'tag-important', optional: 'tag-optional' }[t.tag];
  return `
    <div class="topic-card" id="card-${si}-${ti}" onclick="toggleTopic(${si}, ${ti})">
      <div class="topic-header">
        <div class="topic-name">${t.name}</div>
        <span class="topic-tag ${tagClass}">${t.tagLabel}</span>
      </div>
      <div class="topic-summary">${t.summary}</div>
      <div class="topic-detail" id="detail-${si}-${ti}">
        <div class="detail-section">
          <div class="detail-label">底层原理</div>
          <div class="detail-content">${t.principle}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">必须掌握</div>
          <div class="detail-content"><ul>${t.mustKnow.map(m => `<li>${m}</li>`).join('')}</ul></div>
        </div>
        <div class="detail-section">
          <div class="detail-label">实践技巧</div>
          <div class="tips-box detail-content"><ul>${t.tips.map(tip => `<li>${tip}</li>`).join('')}</ul></div>
        </div>
      </div>
    </div>
  `;
}

function switchStage(idx) {
  document.querySelectorAll('.stage-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.querySelectorAll('.stage-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
}

function toggleTopic(si, ti) {
  const detail = document.getElementById(`detail-${si}-${ti}`);
  const card = document.getElementById(`card-${si}-${ti}`);
  const isOpen = detail.classList.contains('open');
  detail.classList.toggle('open', !isOpen);
  card.classList.toggle('expanded', !isOpen);
}

renderStages();
</script>
