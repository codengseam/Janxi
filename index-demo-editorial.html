<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简兮 · 工具目录</title>
  <style>
    :root {
      --paper: #faf8f5;
      --ink: #1a1a1a;
      --ink-light: #555;
      --ink-muted: #999;
      --accent: #c25e00;
      --rule: #e0ddd8;
      --serif: 'Noto Serif SC', 'Songti SC', 'STSong', Georgia, serif;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--paper);
      color: var(--ink);
      line-height: 1.6;
    }

    header {
      padding: 96px 24px 56px;
      border-bottom: 1px solid var(--rule);
    }
    .masthead {
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 40px;
    }
    .hero {
      max-width: 980px;
      margin: 0 auto;
    }
    .issue {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-bottom: 18px;
    }
    h1 {
      font-family: var(--serif);
      font-size: clamp(44px, 8vw, 96px);
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
    }
    .lede {
      max-width: 520px;
      font-size: 18px;
      color: var(--ink-light);
      line-height: 1.7;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 56px 24px 96px;
    }

    .toc-head {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 40px;
    }
    .toc-head h2 {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 600;
    }
    .toc-head span {
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    .toc {
      list-style: none;
      counter-reset: item;
    }
    .toc li {
      border-bottom: 1px solid var(--rule);
      padding: 22px 0;
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 24px;
      align-items: baseline;
      transition: background .15s;
    }
    .toc li::before {
      counter-increment: item;
      content: counter(item, decimal-leading-zero);
      font-family: var(--serif);
      font-size: 24px;
      color: var(--accent);
    }
    .toc li:hover { background: rgba(194,94,0,0.03); }
    .toc-title {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .toc-meta {
      font-size: 13px;
      color: var(--ink-muted);
    }
    .toc-actions {
      display: flex;
      gap: 18px;
      font-size: 13px;
    }
    .toc-actions a {
      color: var(--ink-light);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .2s, color .2s;
    }
    .toc-actions a:hover { color: var(--accent); border-color: var(--accent); }

    .sections {
      margin-top: 72px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 40px;
    }
    .section h3 {
      font-family: var(--serif);
      font-size: 18px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--rule);
    }
    .section ul { list-style: none; }
    .section li { margin-bottom: 10px; }
    .section a {
      color: var(--ink);
      text-decoration: none;
      font-size: 15px;
    }
    .section a:hover { color: var(--accent); }
    .section small {
      display: block;
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 2px;
    }

    footer {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 24px 64px;
      border-top: 1px solid var(--rule);
      font-size: 12px;
      color: var(--ink-muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    footer a { color: var(--ink-light); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @media (max-width: 640px) {
      header { padding: 64px 20px 40px; }
      main { padding: 40px 20px 64px; }
      .toc li { grid-template-columns: 40px 1fr; }
      .toc-actions { grid-column: 2; }
      .toc-title { font-size: 18px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="masthead">
      <span>Janxi Tools</span>
      <span>Issue 01 · 2026</span>
    </div>
    <div class="hero">
      <div class="issue">轻量 · 纯静态 · 本地优先</div>
      <h1>简兮</h1>
      <p class="lede">一组无后端依赖的静态小工具。打开即可使用，数据留在本地。格式转换、效率专注与学习速查，按需取用。</p>
    </div>
  </header>

  <main>
    <div class="toc-head">
      <h2>目录</h2>
      <span></span>
    </div>
    <ol class="toc" id="toc"></ol>

    <div class="sections" id="sections"></div>
  </main>

  <footer>
    <span>其他风格：<a href="index.html">Bento 风</a> · <a href="index-demo-terminal.html">终端风</a></span>
    <span>7 tools · 3 categories</span>
  </footer>

  <script>
    const tools = [
      { file: 'file-converter.html', title: '文件格式转换', desc: '本地离线文件格式互转', category: '格式转换' },
      { file: 'pdf-to-ppt-converter.html', title: 'PDF 转 PPT', desc: 'PDF 页面识别并导出 PPTX', category: '格式转换' },
      { file: '番茄时钟.html', title: '超级番茄', desc: '番茄工作法计时器', category: '效率专注' },
      { file: 'ai_learning_path_for_programmers.html', title: '程序员 AI 学习路径', desc: '阶段性学习路线', category: '学习速查' },
      { file: 'data_structures_guide.html', title: '数据结构完全指南', desc: 'Python 版算法与数据结构', category: '学习速查' },
      { file: 'algo_tier1.html', title: '算法第一梯队速查', desc: '高频核心算法模板', category: '学习速查' },
      { file: 'algo_tier2_3 (1).html', title: '算法第二、三梯队速查', desc: '进阶算法专题', category: '学习速查' }
    ];

    const toc = document.getElementById('toc');
    const sections = document.getElementById('sections');
    const groups = {};
    tools.forEach(t => (groups[t.category] ||= []).push(t));

    tools.forEach(t => {
      toc.innerHTML += `
        <li>
          <div>
            <div class="toc-title">${t.title}</div>
            <div class="toc-meta">${t.category} · ${t.desc}</div>
          </div>
          <div class="toc-actions">
            <a href="${t.file}">打开</a>
            <a href="${t.file}" download="${t.file}">下载</a>
          </div>
        </li>
      `;
    });

    Object.keys(groups).forEach(cat => {
      const sec = document.createElement('section');
      sec.className = 'section';
      sec.innerHTML = `<h3>${cat}</h3><ul></ul>`;
      const ul = sec.querySelector('ul');
      groups[cat].forEach(t => {
        ul.innerHTML += `
          <li>
            <a href="${t.file}">${t.title}</a>
            <small>${t.desc}</small>
          </li>
        `;
      });
      sections.appendChild(sec);
    });
  </script>
</body>
</html>
